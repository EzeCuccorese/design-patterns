server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Cabeceras de seguridad HTTP robustas
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Content-Security-Policy ajustado
        # default-src 'self' - Solo cargar recursos del propio origen por defecto.
        # style-src 'self' 'unsafe-inline' https://fonts.googleapis.com - Permitir estilos locales, inline (requerido por Vite/PrismJS) y Google Fonts.
        # font-src 'self' data: https://fonts.gstatic.com - Permitir fuentes locales, inline (data:) y Google Fonts.
        # img-src 'self' data: blob: - Permitir imágenes del mismo origen, en formato data (base64) o blob.
        # script-src 'self' 'unsafe-inline' - Permitir scripts locales y scripts inline (Vite/PrismJS).
        # connect-src 'self' - Limitar peticiones de red (fetch/XHR) al propio origen.
        # object-src 'none' - Deshabilitar plugins como Flash, Java Applets, etc.
        # frame-ancestors 'self' - Permitir embeber en iframes solo desde el propio origen.
        # base-uri 'self' - Limitar el elemento <base> al propio origen.
        # form-action 'self' - Limitar el destino de los formularios al propio origen.
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        # Deshabilitar cache para index.html para asegurar actualizaciones rápidas
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        }

        # Cache de larga duración para assets estáticos (con hash)
        location ~* \.(?:css|js|woff2?|svg|gif|png|jpe?g|webp|ico|json)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        }
    }

    # Deshabilitar logs para favicon y robots.txt
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Páginas de error personalizadas
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
